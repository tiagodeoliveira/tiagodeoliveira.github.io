  <!-- INJECT:body -->

  <script>
    // Fixed nav highlight on scroll (gracefully handles missing sections)
    const sections = document.querySelectorAll('.parallax-section');
    const navLinks = document.querySelectorAll('.nav-link[data-section]');
    const fixedNav = document.getElementById('fixedNav');

    function updateNav() {
      if (!navLinks.length || !sections.length) return;
      const scrollY = window.scrollY + window.innerHeight / 3;
      let current = 'hero';
      sections.forEach(section => {
        if (scrollY >= section.offsetTop) {
          current = section.id;
        }
      });
      navLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.section === current);
      });
      if (fixedNav) fixedNav.classList.toggle('scrolled', window.scrollY > 100);
    }

    // Parallax effect for decorative elements
    const parallaxGears = document.getElementById('parallaxGears');
    function updateParallax() {
      if (parallaxGears) {
        parallaxGears.style.transform = `translateY(${window.scrollY * 0.3}px)`;
      }
    }

    // Make all content visible immediately
    document.querySelectorAll('.content-wrapper, .hero-content').forEach(el => {
      el.classList.add('visible');
    });

    // Smooth scroll for nav links with data-section (index page only)
    document.querySelectorAll('.nav-link[data-section]').forEach(link => {
      link.addEventListener('click', (e) => {
        const target = document.getElementById(link.dataset.section);
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // Scroll listeners
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          updateNav();
          updateParallax();
          ticking = false;
        });
        ticking = true;
      }
    });

    // Update URL hash on scroll (only on pages with sections)
    if (sections.length) {
      function updateHash() {
        const sectionIds = ['hero', 'journey', 'philosophy', 'resume'];
        let current = 'hero';
        for (const id of sectionIds) {
          const el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= window.innerHeight / 3) {
            current = id;
          }
        }
        const hash = current === 'hero' ? '' : '#' + current;
        if (window.location.hash !== hash && (hash || window.location.hash)) {
          history.replaceState(null, '', hash || window.location.pathname);
        }
      }
      window.addEventListener('scroll', () => requestAnimationFrame(updateHash), { passive: true });
    }

    // Scroll to hash on page load
    if (window.location.hash) {
      const target = document.getElementById(window.location.hash.slice(1));
      if (target) {
        setTimeout(() => target.scrollIntoView({ behavior: 'smooth' }), 100);
      }
    }

    // Nav background on sub-pages (no scroll sections)
    if (fixedNav && !sections.length) {
      fixedNav.classList.add('scrolled');
    }

    updateNav();
  </script>
